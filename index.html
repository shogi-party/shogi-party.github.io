        </section>

        <section id="about-section">
            <h2>クラブ概要</h2>
            <div id="about-content" class="flex-content"></div>
        </section>

        <!-- 連絡先セクション -->
        <section id="contact-section">
            <h2>連絡先</h2>
            <div id="contact-content"></div>
        </section>

    <!-- データファイルと制御スクリプトの読み込み -->
